<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teddy Customizer</title>

<style>

/* ===== TEDDY (mai mic) ===== */
#teddyImage{
  position:absolute;
  left:50%;
  bottom:-20px;
  transform:translateX(-50%);
  width:min(150%, 820px);
}

/* ===== HEART / STAR ===== */
#heartImg,
#starImg{
  left:50%;
  top:66%;
  width:min(58%, 280px);
  transform:translate(-50%,-50%);
}

/* ===== BOW (MODIFICAT) ===== */
#bowImg{
  left:74%;
  top:25%;       /* mai jos */
  width:230px;   /* mai mic */
  transform:translate(-50%,-50%) rotate(22deg);
}

/* ===== MOBILE ===== */
@media (max-width:760px){

  #teddyImage{
    width:min(160%, 620px);
    bottom:-48px;
  }

  #bowImg{
    width:min(31%, 118px);
    top:30%;
    left:72%;
  }

}

@media (max-width:420px){

  #teddyImage{
    width:min(170%, 560px);
    bottom:-50px;
  }

  #bowImg{
    width:min(31%, 104px);
    top:31%;
    left:73%;
  }

}

</style>
</head>

<body>

<img id="teddyImage" src="Teddy_Bear_Colors/teddy-bear-cream.png">
<img id="heartImg">
<img id="starImg">
<img id="bowImg">

<script>

/* ===== SCALE CONTROL (IMPORTANT) ===== */
function getAccessoryScale(){

  if(window.innerWidth <= 420){
    return {
      centerWidth: "188px",
      centerTop: "74%",
      bowWidth: "104px",
      bowTop: "31%",
      bowLeft: "73%"
    };
  }

  if(window.innerWidth <= 760){
    return {
      centerWidth: "212px",
      centerTop: "73%",
      bowWidth: "118px",
      bowTop: "30%",
      bowLeft: "72%"
    };
  }

  return {
    centerWidth: "280px",
    centerTop: "66%",
    bowWidth: "230px",
    bowTop: "25%",
    bowLeft: "74%"
  };
}

/* ===== APPLY POSITION ===== */
function applyBow(){
  const scale = getAccessoryScale();
  const bow = document.getElementById("bowImg");

  bow.style.top = scale.bowTop;
  bow.style.left = scale.bowLeft;
  bow.style.width = scale.bowWidth;
}

/* ===== INIT ===== */
window.addEventListener("load", applyBow);
window.addEventListener("resize", applyBow);

</script>

</body>
</html>
