<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maison Doucette – Atelier</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f1eb;
  --panel:#fffaf6;
  --brown:#6a5145;
  --gold:#d2b08d;
}

body{
  margin:0;
  font-family:Manrope;
  background:var(--bg);
  color:var(--brown);
}

/* TOP BAR */
.top-bar{
  position:sticky;
  top:0;
  z-index:2000;
  background:linear-gradient(135deg,#b88e67,#d2b08d);
  color:white;
  text-align:center;
  padding:10px;
  font-size:13px;
}

/* HEADER */
.header{
  position:sticky;
  top:40px;
  background:#fffaf6cc;
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 18px;
  border-bottom:1px solid #eee;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* PREVIEW */
.preview-card{
  background:var(--panel);
  border-radius:25px;
  padding:15px;
  position:sticky;
  top:120px;
}

.preview{
  position:relative;
  height:420px;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(#f5f3f1,#ebe8e3);
}

.preview img{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
}

/* OPTIONS */
.section{
  background:var(--panel);
  border-radius:25px;
  padding:15px;
}

.section h2{
  font-family:"Cormorant Garamond";
  margin:0 0 10px;
}

.option{
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:8px;
  cursor:pointer;
}

.option.active{
  border:2px solid var(--gold);
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:linear-gradient(135deg,#b88e67,#d2b08d);
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

/* MOBILE */
@media(max-width:800px){
  .container{
    grid-template-columns:1fr;
  }

  .preview-card{
    position:sticky;
    top:100px;
    z-index:1000;
  }
}
</style>
</head>

<body>

<div class="top-bar">NOU • Maison Mystery Experience</div>

<div class="header">
  <div class="menu-btn">☰</div>
  <div>Maison Doucette</div>
  <div>🛒</div>
</div>

<div class="container">

  <!-- PREVIEW -->
  <div class="preview-card">
    <div class="preview" id="preview"></div>
  </div>

  <!-- OPTIONS -->
  <div>

    <div class="section">
      <h2>Culoare corp</h2>
      <div id="baseOptions"></div>
    </div>

    <div class="section">
      <h2>Accesorii</h2>
      <div id="options"></div>
    </div>

    <button class="btn" onclick="addToCart()">Adaugă în coș</button>

  </div>

</div>

<script src="products.js"></script>

<script>
const slug = new URLSearchParams(location.search).get("slug") || "bunny";
const product = PRODUCTS[slug];

let selectedBase = product.bases[0];
let selectedOption = null;

function renderBase(){
  const el = document.getElementById("baseOptions");
  el.innerHTML = "";

  product.bases.forEach(base=>{
    const div = document.createElement("div");
    div.className="option";
    div.innerText = base.name;

    if(base === selectedBase) div.classList.add("active");

    div.onclick = ()=>{
      selectedBase = base;
      render();
    };

    el.appendChild(div);
  });
}

function renderOptions(){
  const el = document.getElementById("options");
  el.innerHTML = "";

  product.options[0].items.forEach(opt=>{
    const div = document.createElement("div");
    div.className="option";
    div.innerText = opt.name;

    if(opt === selectedOption) div.classList.add("active");

    div.onclick = ()=>{
      selectedOption = opt;
      render();
    };

    el.appendChild(div);
  });
}

function renderPreview(){
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  // BASE
  const baseImg = document.createElement("img");
  baseImg.src = selectedBase.src;
  Object.assign(baseImg.style, selectedBase.style);
  preview.appendChild(baseImg);

  // LAYERS
  if(selectedOption){
    selectedOption.layers.forEach(layer=>{
      const img = document.createElement("img");
      img.src = layer.src;
      Object.assign(img.style, layer.style);
      preview.appendChild(img);
    });
  }
}

function render(){
  renderBase();
  renderOptions();
  renderPreview();
}

function addToCart(){
  const cart = JSON.parse(localStorage.getItem("cart") || "[]");

  cart.push({
    name: product.name,
    base: selectedBase.name,
    option: selectedOption?.name || "Fără",
    price: product.basePrice
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Adăugat în coș");
}

render();
</script>

</body>
</html>
